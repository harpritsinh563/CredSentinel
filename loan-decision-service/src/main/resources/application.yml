spring:
  application:
    name: loan-decision-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: CredSentinel.LoanDecisionService
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer

        spring.json.use.type.headers: false
        spring.json.value.default.type: com.credsentinel.loandecision.model.LoanRequestCreatedEvent
        spring.json.trusted.packages: com.credsentinel.loandecision.model

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082
  datasource:
    url: jdbc:h2:mem:loandecisiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: loandecision1234

    h2:
      console:
        enabled: true
        path: /h2-console
        settings:
          trace: false
          web-allow-others: false

    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: update
      show-sql: false
      properties:
        hibernate:
          format_sql: true

grpc:
  client:
    loan-anomaly-service:
      address: 'static://localhost:9091' # Change for deployment
      negotiation-type: plaintext

logging:
  level:
    root: INFO
