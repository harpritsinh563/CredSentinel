spring:
  application:
    name: loan-decision-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: CredSentinel.LoanDecisionService
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer

        spring.json.use.type.headers: false
        spring.json.value.default.type: com.credsentinel.loandecision.model.LoanRequestCreatedEvent
        spring.json.trusted.packages: com.credsentinel.loandecision.model

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

logging:
  level:
    root: INFO
